<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Scout ⚡ MLB Home Run Predictions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0c10; color: #e8eaf0; font-family: 'Courier New', monospace; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111318; }
    ::-webkit-scrollbar-thumb { background: #2a2e3a; border-radius: 3px; }
    select, textarea, button { font-family: inherit; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Constants ────────────────────────────────────────────────────────────────
const CONF_STYLE = {
  high:   { border:'1px solid #3ddc84', color:'#3ddc84', background:'rgba(61,220,132,0.08)' },
  medium: { border:'1px solid #f5a623', color:'#f5a623', background:'rgba(245,166,35,0.08)' },
  low:    { border:'1px solid #4a5060', color:'#4a5060', background:'transparent' },
};
const dotColor  = v => v >= 65 ? '#f5a623' : v >= 45 ? 'rgba(245,166,35,0.38)' : '#1e2230';
const rankColor = i => i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'#2a2e3a';

function sanitizeJSON(raw) {
  return raw
    .replace(/```json|```/g,'')
    .replace(/"\s*>\s*(?=\d)/g,'": ')
    .replace(/"\s*>\s*(?=")/g,'": ')
    .replace(/"\s*>\s*(?=\[)/g,'": ')
    .replace(/"\s*>\s*(?=\{)/g,'": ')
    .replace(/"\s*>\s*(?=true|false|null)/g,'": ')
    .trim();
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
}

// ─── Subcomponents ────────────────────────────────────────────────────────────
function LiveBadge() {
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:'0.58rem',
      letterSpacing:'2px',textTransform:'uppercase',color:'#3ddc84'}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:'#3ddc84',
        animation:'pulse 1.8s ease infinite'}}/>
      LIVE
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 70 ? '#f5a623' : score >= 60 ? '#e08020' : '#555';
  return (
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div style={{flex:1,height:5,background:'#222630'}}>
        <div style={{height:'100%',width:`${score}%`,background:color,transition:'width 0.4s ease'}}/>
      </div>
      <div style={{fontFamily:'Georgia,serif',fontSize:'1rem',color,minWidth:28,textAlign:'right'}}>
        {score}
      </div>
    </div>
  );
}

function FactorDots({ p }) {
  return (
    <div style={{display:'flex',gap:5,alignItems:'center'}}>
      {[{k:'batter_score',l:'Batter'},{k:'pitcher_score',l:'Opp. Pitcher'},
        {k:'bullpen_score',l:'Bullpen'},{k:'park_score',l:'Park'}].map(f=>(
        <div key={f.k} title={`${f.l}: ${p[f.k]}`}
          style={{width:9,height:9,borderRadius:'50%',background:dotColor(p[f.k]||0),
            border:`1px solid ${(p[f.k]||0)>=45?'#f5a623':'#222630'}`,cursor:'help'}}/>
      ))}
    </div>
  );
}

function ExpandedRow({ p }) {
  return (
    <tr>
      <td colSpan={7} style={{background:'#111318',borderBottom:'1px solid #222630',padding:'14px 18px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',
          gap:14,fontSize:'0.68rem',color:'#7a8090',lineHeight:1.8}} className="fade-in">
          <div>
            <div style={{fontSize:'0.56rem',letterSpacing:'2px',textTransform:'uppercase',color:'#f5a623',marginBottom:4}}>Analysis</div>
            {p.reasoning}
          </div>
          <div>
            <div style={{fontSize:'0.56rem',letterSpacing:'2px',textTransform:'uppercase',color:'#f5a623',marginBottom:4}}>Opposing Pitcher</div>
            <span style={{color:'#e8eaf0',fontWeight:700}}>{p.sp_name}</span> · ERA {p.sp_era}
            <div style={{marginTop:4}}>Pitcher vuln score: <span style={{color:'#f5a623'}}>{p.pitcher_score}</span></div>
          </div>
          <div>
            <div style={{fontSize:'0.56rem',letterSpacing:'2px',textTransform:'uppercase',color:'#f5a623',marginBottom:4}}>Factor Breakdown</div>
            Batter <span style={{color:'#e8eaf0'}}>{p.batter_score}</span> · Pitcher <span style={{color:'#e8eaf0'}}>{p.pitcher_score}</span><br/>
            Bullpen <span style={{color:'#e8eaf0'}}>{p.bullpen_score}</span> · Park <span style={{color:'#e8eaf0'}}>{p.park_score}</span>
          </div>
        </div>
      </td>
    </tr>
  );
}

function Th({ col, label, sortCol, sortAsc, onSort }) {
  return (
    <th onClick={() => onSort(col)} style={{
      padding:'10px 14px', textAlign:'left', fontFamily:"'Courier New',monospace",
      fontSize:'0.62rem', letterSpacing:'2.5px', textTransform:'uppercase',
      color: sortCol===col ? '#f5a623' : '#4a5060', cursor:'pointer', userSelect:'none',
      whiteSpace:'nowrap', background:'#111318', borderBottom:'1px solid #222630',
    }}>
      {label}{sortCol===col ? (sortAsc ? ' ↑' : ' ↓') : ''}
    </th>
  );
}

// ─── Results table ────────────────────────────────────────────────────────────
function ResultsTable({ results, generatedAt, gamesCount }) {
  const [expanded,    setExpanded]    = useState(null);
  const [sortCol,     setSortCol]     = useState('score');
  const [sortAsc,     setSortAsc]     = useState(false);
  const [limit,       setLimit]       = useState(999);
  const [minScore,    setMinScore]    = useState(0);
  const [handFilter,  setHandFilter]  = useState('all');
  const [gameFilter,  setGameFilter]  = useState('all');

  const handleSort = col => {
    if (sortCol===col) setSortAsc(a=>!a);
    else { setSortCol(col); setSortAsc(false); }
  };

  const allGames = [...new Set(results.map(p=>p.game))].sort();

  const filtered = [...results]
    .filter(p => (p.score||0) >= minScore)
    .filter(p => handFilter==='all' || p.hand===handFilter)
    .filter(p => gameFilter==='all' || p.game===gameFilter)
    .sort((a,b) => {
      let av=a[sortCol], bv=b[sortCol];
      if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}
      return sortAsc ? (av>bv?1:-1) : (av<bv?1:-1);
    })
    .slice(0, limit);

  const thProps = { sortCol, sortAsc, onSort: handleSort };

  return (
    <>
      {/* Stats strip */}
      <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
        {[
          {label:'Players Ranked', value:results.length},
          {label:'Games Today',    value:gamesCount || '—'},
          {label:'Updated',        value:generatedAt ? formatTime(generatedAt) : '—'},
        ].map(s=>(
          <div key={s.label} style={{background:'#111318',border:'1px solid #222630',
            padding:'8px 14px',display:'flex',flexDirection:'column',gap:2}}>
            <span style={{fontSize:'0.56rem',letterSpacing:'2px',textTransform:'uppercase',color:'#4a5060'}}>{s.label}</span>
            <span style={{fontFamily:'Georgia,serif',fontSize:'1.1rem',color:'#f5a623'}}>{s.value}</span>
          </div>
        ))}
      </div>

      {/* Controls */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        {[
          {label:'Show',      value:limit,      onChange:v=>setLimit(+v),     options:[['999','All'],['15','Top 15'],['25','Top 25'],['50','Top 50']]},
          {label:'Min Score', value:minScore,   onChange:v=>setMinScore(+v),  options:[['0','Any'],['50','50+'],['60','60+'],['70','70+']]},
          {label:'Hand',      value:handFilter, onChange:v=>setHandFilter(v), options:[['all','All'],['L','LHB'],['R','RHB'],['S','Switch']]},
        ].map(ctrl=>(
          <div key={ctrl.label} style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:'0.58rem',letterSpacing:'2px',textTransform:'uppercase',color:'#4a5060'}}>{ctrl.label}</span>
            <select value={ctrl.value} onChange={e=>ctrl.onChange(e.target.value)}
              style={{fontFamily:"'Courier New',monospace",fontSize:'0.75rem',background:'#161a22',
                color:'#e8eaf0',border:'1px solid #222630',padding:'6px 10px',cursor:'pointer'}}>
              {ctrl.options.map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
          </div>
        ))}
        {allGames.length > 1 && (
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:'0.58rem',letterSpacing:'2px',textTransform:'uppercase',color:'#4a5060'}}>Game</span>
            <select value={gameFilter} onChange={e=>setGameFilter(e.target.value)}
              style={{fontFamily:"'Courier New',monospace",fontSize:'0.75rem',background:'#161a22',
                color:'#e8eaf0',border:'1px solid #222630',padding:'6px 10px',cursor:'pointer'}}>
              <option value="all">All Games</option>
              {allGames.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
          </div>
        )}
        <div style={{marginLeft:'auto',fontSize:'0.62rem',color:'#4a5060'}}>
          {filtered.length} players · click row to expand
        </div>
      </div>

      {/* Table */}
      <div style={{overflowX:'auto',border:'1px solid #222630'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.78rem'}}>
          <thead>
            <tr>
              <th style={{padding:'10px 14px',background:'#111318',borderBottom:'1px solid #222630',
                width:36,color:'#4a5060',fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase'}}>#</th>
              <Th col="player"     label="Player"   {...thProps}/>
              <Th col="score"      label="HR Score"  {...thProps}/>
              <th style={{padding:'10px 14px',background:'#111318',borderBottom:'1px solid #222630',
                color:'#4a5060',fontSize:'0.6rem',letterSpacing:'2.5px',textTransform:'uppercase'}}>Matchup</th>
              <th style={{padding:'10px 14px',background:'#111318',borderBottom:'1px solid #222630',
                color:'#4a5060',fontSize:'0.6rem',letterSpacing:'2.5px',textTransform:'uppercase'}}>Factors</th>
              <Th col="confidence" label="Conf"     {...thProps}/>
              <th style={{padding:'10px 14px',background:'#111318',borderBottom:'1px solid #222630',
                color:'#4a5060',fontSize:'0.6rem',letterSpacing:'2.5px',textTransform:'uppercase'}}>Form</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((p,i) => {
              const isExp = expanded===i;
              return [
                <tr key={`r${i}`}
                  onClick={()=>setExpanded(isExp?null:i)}
                  style={{cursor:'pointer',background:isExp?'rgba(245,166,35,0.04)':'transparent',transition:'background 0.15s'}}
                  onMouseEnter={e=>{if(!isExp)e.currentTarget.style.background='rgba(245,166,35,0.025)'}}
                  onMouseLeave={e=>{e.currentTarget.style.background=isExp?'rgba(245,166,35,0.04)':'transparent'}}>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28',textAlign:'center',
                    fontFamily:'Georgia,serif',fontSize:'1.05rem',color:rankColor(i)}}>{i+1}</td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28'}}>
                    <div style={{fontFamily:'Georgia,serif',fontSize:'0.92rem',fontWeight:700}}>{p.player}</div>
                    <div style={{fontSize:'0.58rem',color:'#4a5060',letterSpacing:'2px',textTransform:'uppercase',marginTop:2}}>
                      {p.team} · {p.hand==='L'?'LHB':p.hand==='R'?'RHB':'SHB'}
                    </div>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28',minWidth:120}}>
                    <ScoreBar score={p.score||0}/>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28'}}>
                    <div style={{fontSize:'0.7rem',color:'#7a8090',fontStyle:'italic'}}>{p.game}</div>
                    <div style={{fontSize:'0.58rem',color:'#4a5060',marginTop:2}}>{p.park}</div>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28'}}>
                    <FactorDots p={p}/>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28'}}>
                    <span style={{...(CONF_STYLE[p.confidence]||CONF_STYLE.low),
                      fontSize:'0.6rem',fontWeight:700,letterSpacing:'1.5px',
                      textTransform:'uppercase',padding:'2px 7px',display:'inline-block'}}>
                      {p.confidence==='medium'?'MED':(p.confidence||'LOW').toUpperCase()}
                    </span>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28',
                    fontSize:'0.65rem',color:'#4a5060',fontStyle:'italic',maxWidth:160}}>
                    {p.recent_form||'—'}
                  </td>
                </tr>,
                isExp && <ExpandedRow key={`e${i}`} p={p}/>,
              ];
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}

// ─── History panel ────────────────────────────────────────────────────────────
function HistoryPanel() {
  const [log, setLog] = useState(null);

  useEffect(() => {
    // Try to load hr_scout_results.json if it exists in the repo
    fetch('hr_scout_results.json')
      .then(r => r.ok ? r.json() : null)
      .then(data => data && setLog(data))
      .catch(() => {});
  }, []);

  if (!log || Object.keys(log).length === 0) return (
    <div style={{padding:'24px 0',color:'#4a5060',fontSize:'0.72rem',textAlign:'center'}}>
      No calibration data yet. Log results via Cell 5 of the notebook to track accuracy here.
    </div>
  );

  const totals = {'70+': {p:0,h:0}, '60-69': {p:0,h:0}, '50-59': {p:0,h:0}, '<50': {p:0,h:0}};
  const sorted = Object.entries(log).sort(([a],[b])=>b.localeCompare(a)).slice(0,10);

  sorted.forEach(([,r]) => {
    Object.entries(r.by_bucket||{}).forEach(([bucket,stats]) => {
      if(totals[bucket]) { totals[bucket].p += stats.predicted; totals[bucket].h += stats.hr; }
    });
  });

  return (
    <div>
      <div style={{marginBottom:18}}>
        {sorted.map(([d,r])=>(
          <div key={d} style={{display:'flex',gap:12,padding:'8px 0',borderBottom:'1px solid #1a1e28',
            fontSize:'0.68rem',flexWrap:'wrap',alignItems:'center'}}>
            <span style={{color:'#f5a623',minWidth:90}}>{d}</span>
            <span style={{color:'#e8eaf0'}}>{r.hr_count}/{r.played} HR ({r.hit_rate_pct}%)</span>
            <span style={{color:'#4a5060',fontStyle:'italic',fontSize:'0.62rem'}}>
              {(r.hr_players||[]).join(', ')||'none'}
            </span>
          </div>
        ))}
      </div>
      <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'#4a5060',marginBottom:10}}>
        Cumulative Hit Rate by Score Bucket
      </div>
      {Object.entries(totals).filter(([,t])=>t.p>0).map(([bucket,t])=>{
        const rate = Math.round(t.h/t.p*100*10)/10;
        const fill = Math.round(rate/2);
        return (
          <div key={bucket} style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,fontSize:'0.68rem'}}>
            <span style={{minWidth:52,color:'#7a8090'}}>{bucket}</span>
            <div style={{flex:1,height:6,background:'#1a1e28'}}>
              <div style={{height:'100%',width:`${Math.min(rate,100)}%`,
                background:bucket==='70+'?'#f5a623':bucket==='60-69'?'#e08020':'#555',
                transition:'width 0.5s ease'}}/>
            </div>
            <span style={{minWidth:80,color:'#e8eaf0',textAlign:'right'}}>
              {rate}% ({t.h}/{t.p})
            </span>
          </div>
        );
      })}
      <div style={{marginTop:10,fontSize:'0.6rem',color:'#2a2e3a'}}>
        MLB baseline HR rate ~3% per PA · Target: 70+ bucket ≥ 15%
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function HRScout() {
  const [predictions,  setPredictions]  = useState([]);
  const [generatedAt,  setGeneratedAt]  = useState('');
  const [gameDate,     setGameDate]     = useState('');
  const [gamesCount,   setGamesCount]   = useState(0);
  const [loadStatus,   setLoadStatus]   = useState('loading'); // loading | loaded | empty | error | manual
  const [loadError,    setLoadError]    = useState('');
  const [view,         setView]         = useState('results'); // results | paste | history
  const [rawInput,     setRawInput]     = useState('');
  const [parseError,   setParseError]   = useState('');
  const [autoFixed,    setAutoFixed]    = useState(false);

  // Auto-load predictions.json on mount
  useEffect(() => {
    fetch('predictions.json?t=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        const preds = data.predictions || [];
        setPredictions(preds);
        setGeneratedAt(data.generated_at || '');
        setGameDate(data.game_date || '');
        setGamesCount(data.games_count || 0);
        setLoadStatus(preds.length > 0 ? 'loaded' : 'empty');
      })
      .catch(err => {
        setLoadStatus('error');
        setLoadError(err.message);
        setView('paste'); // fall back to paste tab
      });
  }, []);

  const handleManualLoad = () => {
    setAutoFixed(false);
    try {
      const original  = rawInput.replace(/```json|```/g,'').trim();
      const sanitized = sanitizeJSON(rawInput);
      const wasFixed  = original !== sanitized;
      const parsed    = JSON.parse(sanitized);
      if (!Array.isArray(parsed)) throw new Error('Expected a JSON array');
      if (parsed.length === 0)   throw new Error('Array is empty');
      setPredictions(parsed);
      setGeneratedAt(new Date().toISOString());
      setGameDate(new Date().toISOString().slice(0,10));
      setGamesCount(0);
      setParseError('');
      setAutoFixed(wasFixed);
      setLoadStatus('manual');
      setView('results');
    } catch(e) {
      setParseError('Could not parse predictions: ' + e.message);
    }
  };

  const nextRefresh = () => {
    const now = new Date();
    const next = new Date();
    next.setHours(9,0,0,0);
    if (next <= now) next.setDate(next.getDate()+1);
    const diff = Math.round((next-now)/60000);
    const h = Math.floor(diff/60), m = diff%60;
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  };

  const isLive = loadStatus === 'loaded';

  return (
    <div style={{background:'#0a0c10',minHeight:'100vh',color:'#e8eaf0',
      fontFamily:"'Courier New',monospace",padding:'0 0 60px'}}>
      {/* Grid background */}
      <div style={{position:'fixed',inset:0,
        backgroundImage:'linear-gradient(rgba(245,166,35,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,0.025) 1px,transparent 1px)',
        backgroundSize:'40px 40px',pointerEvents:'none',zIndex:0}}/>

      <div style={{position:'relative',zIndex:1,maxWidth:1060,margin:'0 auto',padding:'0 20px'}}>

        {/* HEADER */}
        <div style={{padding:'32px 0 18px',borderBottom:'1px solid #222630',marginBottom:22,
          display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{fontFamily:'Georgia,serif',fontSize:'2.6rem',fontWeight:700,letterSpacing:3,lineHeight:1}}>
              HR <span style={{color:'#f5a623'}}>SCOUT</span> <span style={{fontSize:'1.2rem'}}>⚡</span>
            </div>
            <div style={{fontSize:'0.6rem',color:'#4a5060',letterSpacing:'3px',textTransform:'uppercase',marginTop:4,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <span>MLB Home Run Probability Engine</span>
              {gameDate && <span style={{color:'#f5a623'}}>· {formatDate(gameDate)}</span>}
              {isLive && <LiveBadge/>}
            </div>
          </div>

          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
            <div style={{display:'flex',gap:0,border:'1px solid #222630'}}>
              {[['results','📊 Rankings'],['paste','📋 Manual'],['history','📈 History']].map(([id,label])=>(
                <button key={id} onClick={()=>setView(id)} style={{
                  fontFamily:"'Courier New',monospace",fontSize:'0.65rem',fontWeight:700,
                  letterSpacing:'1.5px',textTransform:'uppercase',padding:'8px 14px',
                  background:view===id?'#f5a623':'#111318',
                  color:view===id?'#000':'#4a5060',
                  border:'none',cursor:'pointer',
                  borderRight:id!=='history'?'1px solid #222630':'none',
                }}>{label}</button>
              ))}
            </div>
            {isLive && (
              <div style={{fontSize:'0.58rem',color:'#2a2e3a',letterSpacing:'1px'}}>
                Next refresh in ~{nextRefresh()}
              </div>
            )}
          </div>
        </div>

        {/* ── RESULTS VIEW ── */}
        {view === 'results' && (
          <>
            {loadStatus === 'loading' && (
              <div style={{textAlign:'center',padding:'80px 20px',color:'#4a5060'}}>
                <div style={{fontSize:'2rem',animation:'pulse 1.5s ease infinite'}}>⚾</div>
                <div style={{marginTop:16,fontSize:'0.72rem',letterSpacing:'2px'}}>LOADING PREDICTIONS…</div>
              </div>
            )}
            {(loadStatus === 'error' || loadStatus === 'empty') && (
              <div style={{textAlign:'center',padding:'80px 20px',color:'#4a5060'}}>
                <div style={{fontSize:'2.5rem',marginBottom:16,opacity:0.3}}>⚾</div>
                <div style={{fontFamily:'Georgia,serif',fontSize:'1.4rem',letterSpacing:2,marginBottom:8,color:'#2a2e3a'}}>
                  {loadStatus==='error' ? 'PREDICTIONS UNAVAILABLE' : 'NO GAMES TODAY'}
                </div>
                <div style={{fontSize:'0.72rem',marginBottom:20,maxWidth:400,margin:'0 auto 20px'}}>
                  {loadStatus==='error'
                    ? `Could not load predictions.json (${loadError}). Use the Manual tab to paste predictions.`
                    : 'No games scheduled today, or the pipeline hasn\'t run yet.'}
                </div>
                <button onClick={()=>setView('paste')} style={{fontFamily:'Georgia,serif',
                  fontSize:'0.85rem',padding:'9px 20px',background:'#f5a623',color:'#000',border:'none',cursor:'pointer'}}>
                  Manual Paste →
                </button>
              </div>
            )}
            {(loadStatus === 'loaded' || loadStatus === 'manual') && predictions.length > 0 && (
              <div className="fade-in">
                {autoFixed && (
                  <div style={{marginBottom:14,padding:'8px 12px',background:'rgba(245,166,35,0.06)',
                    border:'1px solid #f5a623',color:'#f5a623',fontSize:'0.65rem'}}>
                    ⚡ Auto-fix applied — JSON formatting errors corrected automatically.
                  </div>
                )}
                {loadStatus === 'manual' && (
                  <div style={{marginBottom:14,padding:'8px 12px',background:'rgba(61,220,132,0.06)',
                    border:'1px solid #3ddc84',color:'#3ddc84',fontSize:'0.65rem'}}>
                    ✓ Manual predictions loaded · {predictions.length} players
                  </div>
                )}
                <ResultsTable
                  results={predictions}
                  generatedAt={generatedAt}
                  gamesCount={gamesCount}
                />
              </div>
            )}
          </>
        )}

        {/* ── PASTE VIEW ── */}
        {view === 'paste' && (
          <div className="fade-in">
            <div style={{fontSize:'0.72rem',color:'#7a8090',marginBottom:16,lineHeight:1.8}}>
              <span style={{color:'#f5a623',fontWeight:700}}>Manual override:</span> Run the Jupyter notebook (cells 1–4) → paste the prompt into Claude → copy Claude's JSON response → paste below → click Load.
            </div>
            <textarea value={rawInput} onChange={e=>{setRawInput(e.target.value);if(parseError)setParseError('');}}
              placeholder={"Paste Claude's JSON predictions here...\n\nExample:\n[\n  {\"player\": \"Aaron Judge\", \"team\": \"NYY\", \"score\": 88, ...},\n  ...\n]"}
              style={{width:'100%',minHeight:280,background:'#111318',color:'#e8eaf0',
                border:`1px solid ${parseError?'#ff4d4d':'#222630'}`,padding:'14px',
                fontFamily:"'Courier New',monospace",fontSize:'0.72rem',
                resize:'vertical',lineHeight:1.6,boxSizing:'border-box',outline:'none'}}/>
            {parseError && (
              <div style={{marginTop:8,padding:'8px 12px',background:'rgba(255,77,77,0.08)',
                border:'1px solid #ff4d4d',color:'#ff4d4d',fontSize:'0.68rem'}}>
                ⚠ {parseError}
              </div>
            )}
            <div style={{marginTop:12,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <button onClick={handleManualLoad} disabled={!rawInput.trim()} style={{
                fontFamily:'Georgia,serif',fontSize:'0.95rem',fontWeight:700,padding:'10px 26px',
                background:rawInput.trim()?'#f5a623':'#2a2e3a',
                color:rawInput.trim()?'#000':'#4a5060',
                border:'none',cursor:rawInput.trim()?'pointer':'not-allowed'}}>
                Load Predictions →
              </button>
              <button onClick={()=>{setRawInput('');setParseError('');}} style={{
                fontFamily:"'Courier New',monospace",fontSize:'0.65rem',padding:'8px 14px',
                background:'transparent',color:'#4a5060',border:'1px solid #222630',cursor:'pointer'}}>
                Clear
              </button>
            </div>

            <div style={{marginTop:20,display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
              {[
                {n:'1',t:'Run Notebook',    d:'Open Jupyter, run cells 1–4 to fetch live MLB data, Statcast & weather'},
                {n:'2',t:'Paste Prompt',    d:'Copy hr_scout_prompt.txt and paste into a Claude chat'},
                {n:'3',t:'Get Predictions', d:'Claude returns a JSON array — copy the entire [ ... ] block'},
                {n:'4',t:'Paste & Load',    d:'Paste Claude\'s JSON above and click Load Predictions'},
              ].map(s=>(
                <div key={s.n} style={{background:'#111318',border:'1px solid #222630',padding:'14px'}}>
                  <div style={{fontFamily:'Georgia,serif',fontSize:'1.4rem',color:'#f5a623',marginBottom:6}}>{s.n}</div>
                  <div style={{fontSize:'0.65rem',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'#e8eaf0',marginBottom:4}}>{s.t}</div>
                  <div style={{fontSize:'0.62rem',color:'#4a5060',lineHeight:1.5}}>{s.d}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── HISTORY VIEW ── */}
        {view === 'history' && (
          <div className="fade-in">
            <div style={{fontSize:'0.72rem',color:'#7a8090',marginBottom:20,lineHeight:1.8}}>
              <span style={{color:'#f5a623',fontWeight:700}}>Model calibration</span> — historical accuracy by score bucket. Log results via Cell 5 of the notebook and commit <code style={{color:'#f5a623'}}>hr_scout_results.json</code> to the repo.
            </div>
            <HistoryPanel/>
          </div>
        )}

        {/* DISCLAIMER */}
        <div style={{marginTop:24,padding:'10px 14px',background:'#111318',border:'1px solid #222630',
          fontSize:'0.58rem',color:'#2a2e3a',lineHeight:1.7}}>
          ⚠️ FOR ENTERTAINMENT ONLY — AI-generated predictions using live MLB Stats API data, Statcast metrics, and weather. Pitcher assignments verified: each batter scored against the opposing team's SP only. Do not use for wagering. Auto-refreshes daily at 9:00 AM ET.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HRScout/>);
</script>
</body>
</html>
