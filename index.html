<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Scout ⚡ MLB Home Run Predictions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0c10; color: #e8eaf0; font-family: 'Courier New', monospace; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111318; }
    ::-webkit-scrollbar-thumb { background: #2a2e3a; border-radius: 3px; }
    select, button { font-family: inherit; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CONF_STYLE = {
  high:   { border:'1px solid #3ddc84', color:'#3ddc84', background:'rgba(61,220,132,0.08)' },
  medium: { border:'1px solid #f5a623', color:'#f5a623', background:'rgba(245,166,35,0.08)' },
  low:    { border:'1px solid #4a5060', color:'#4a5060', background:'transparent' },
};
const dotColor  = v => v >= 65 ? '#f5a623' : v >= 45 ? 'rgba(245,166,35,0.38)' : '#1e2230';
const rankColor = i => i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'#2a2e3a';
const fmt_date  = iso => iso ? new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
const fmt_time  = iso => iso ? new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'}) : '';

function LiveBadge() {
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:'0.58rem',letterSpacing:'2px',textTransform:'uppercase',color:'#3ddc84'}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:'#3ddc84',animation:'pulse 1.8s ease infinite'}}/>
      LIVE
    </span>
  );
}

function Th({col,label,sortCol,sortAsc,onSort}) {
  return (
    <th onClick={()=>onSort(col)} style={{padding:'10px 14px',textAlign:'left',fontSize:'0.62rem',letterSpacing:'2.5px',textTransform:'uppercase',color:sortCol===col?'#f5a623':'#4a5060',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',background:'#111318',borderBottom:'1px solid #222630'}}>
      {label}{sortCol===col?(sortAsc?' ↑':' ↓'):''}
    </th>
  );
}

function ExpandedRow({p}) {
  return (
    <tr>
      <td colSpan={7} style={{background:'#111318',borderBottom:'1px solid #222630',padding:'14px 18px'}}>
        <div className="fade-in" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:14,fontSize:'0.68rem',color:'#7a8090',lineHeight:1.8}}>
          <div>
            <div style={{fontSize:'0.56rem',letterSpacing:'2px',textTransform:'uppercase',color:'#f5a623',marginBottom:4}}>Analysis</div>
            {p.reasoning}
          </div>
          <div>
            <div style={{fontSize:'0.56rem',letterSpacing:'2px',textTransform:'uppercase',color:'#f5a623',marginBottom:4}}>Opposing Pitcher</div>
            <span style={{color:'#e8eaf0',fontWeight:700}}>{p.sp_name}</span> · ERA {p.sp_era}
            <div style={{marginTop:4}}>Pitcher vuln score: <span style={{color:'#f5a623'}}>{p.pitcher_score}</span></div>
          </div>
          <div>
            <div style={{fontSize:'0.56rem',letterSpacing:'2px',textTransform:'uppercase',color:'#f5a623',marginBottom:4}}>Factor Breakdown</div>
            Batter <span style={{color:'#e8eaf0'}}>{p.batter_score}</span> · Pitcher <span style={{color:'#e8eaf0'}}>{p.pitcher_score}</span><br/>
            Park <span style={{color:'#e8eaf0'}}>{p.park_score}</span> · Bullpen <span style={{color:'#e8eaf0'}}>{p.bullpen_score}</span>
          </div>
        </div>
      </td>
    </tr>
  );
}

function RankingsView({predictions, generatedAt, gamesCount}) {
  const [expanded,setExpanded]=useState(null);
  const [sortCol,setSortCol]=useState('score');
  const [sortAsc,setSortAsc]=useState(false);
  const [limit,setLimit]=useState(999);
  const [minScore,setMinScore]=useState(0);
  const [handFilter,setHandFilter]=useState('all');
  const [gameFilter,setGameFilter]=useState('all');

  const handleSort = col => { if(sortCol===col)setSortAsc(v=>!v); else{setSortCol(col);setSortAsc(false);} };
  const allGames = [...new Set(predictions.map(p=>p.game))].sort();

  const filtered = [...predictions]
    .filter(p=>(p.score||0)>=minScore)
    .filter(p=>handFilter==='all'||p.hand===handFilter)
    .filter(p=>gameFilter==='all'||p.game===gameFilter)
    .sort((a,b)=>{let av=a[sortCol],bv=b[sortCol];if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase();}return sortAsc?(av>bv?1:-1):(av<bv?1:-1);})
    .slice(0,limit);

  const thP = {sortCol,sortAsc,onSort:handleSort};
  const Sel = ({label,value,onChange,opts}) => (
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      <span style={{fontSize:'0.58rem',letterSpacing:'2px',textTransform:'uppercase',color:'#4a5060'}}>{label}</span>
      <select value={value} onChange={e=>onChange(e.target.value)} style={{fontFamily:"'Courier New',monospace",fontSize:'0.75rem',background:'#161a22',color:'#e8eaf0',border:'1px solid #222630',padding:'6px 10px',cursor:'pointer'}}>
        {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
      </select>
    </div>
  );

  return (
    <>
      <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
        {[{label:'Players Ranked',value:predictions.length},{label:'Games Today',value:gamesCount||'—'},{label:'Updated',value:generatedAt?fmt_time(generatedAt):'—'}].map(s=>(
          <div key={s.label} style={{background:'#111318',border:'1px solid #222630',padding:'8px 14px',display:'flex',flexDirection:'column',gap:2}}>
            <span style={{fontSize:'0.56rem',letterSpacing:'2px',textTransform:'uppercase',color:'#4a5060'}}>{s.label}</span>
            <span style={{fontFamily:'Georgia,serif',fontSize:'1.1rem',color:'#f5a623'}}>{s.value}</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <Sel label="Show"      value={limit}      onChange={v=>setLimit(+v)}     opts={[['999','All'],['15','Top 15'],['25','Top 25'],['50','Top 50']]}/>
        <Sel label="Min Score" value={minScore}   onChange={v=>setMinScore(+v)}  opts={[['0','Any'],['50','50+'],['60','60+'],['70','70+']]}/>
        <Sel label="Hand"      value={handFilter} onChange={v=>setHandFilter(v)} opts={[['all','All'],['L','LHB'],['R','RHB'],['S','Switch']]}/>
        {allGames.length>1 && <Sel label="Game" value={gameFilter} onChange={v=>setGameFilter(v)} opts={[['all','All Games'],...allGames.map(g=>[g,g])]}/>}
        <div style={{marginLeft:'auto',fontSize:'0.62rem',color:'#4a5060'}}>{filtered.length} players · click row to expand</div>
      </div>
      <div style={{overflowX:'auto',border:'1px solid #222630'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.78rem'}}>
          <thead>
            <tr>
              <th style={{padding:'10px 14px',background:'#111318',borderBottom:'1px solid #222630',width:36,color:'#4a5060',fontSize:'0.6rem',letterSpacing:'2px',textTransform:'uppercase'}}>#</th>
              <Th col="player" label="Player" {...thP}/><Th col="score" label="HR Score" {...thP}/>
              <th style={{padding:'10px 14px',background:'#111318',borderBottom:'1px solid #222630',color:'#4a5060',fontSize:'0.6rem',letterSpacing:'2.5px',textTransform:'uppercase'}}>Matchup</th>
              <th style={{padding:'10px 14px',background:'#111318',borderBottom:'1px solid #222630',color:'#4a5060',fontSize:'0.6rem',letterSpacing:'2.5px',textTransform:'uppercase'}}>Factors</th>
              <Th col="confidence" label="Conf" {...thP}/>
              <th style={{padding:'10px 14px',background:'#111318',borderBottom:'1px solid #222630',color:'#4a5060',fontSize:'0.6rem',letterSpacing:'2.5px',textTransform:'uppercase'}}>Form</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((p,i)=>{
              const isExp=expanded===i;
              const sc=p.score>=70?'#f5a623':p.score>=60?'#e08020':'#888';
              return [
                <tr key={`r${i}`} onClick={()=>setExpanded(isExp?null:i)}
                  style={{cursor:'pointer',background:isExp?'rgba(245,166,35,0.04)':'transparent',transition:'background 0.15s'}}
                  onMouseEnter={e=>{if(!isExp)e.currentTarget.style.background='rgba(245,166,35,0.025)'}}
                  onMouseLeave={e=>{e.currentTarget.style.background=isExp?'rgba(245,166,35,0.04)':'transparent'}}>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28',textAlign:'center',fontFamily:'Georgia,serif',fontSize:'1.05rem',color:rankColor(i)}}>{i+1}</td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28'}}>
                    <div style={{fontFamily:'Georgia,serif',fontSize:'0.92rem',fontWeight:700}}>{p.player}</div>
                    <div style={{fontSize:'0.58rem',color:'#4a5060',letterSpacing:'2px',textTransform:'uppercase',marginTop:2}}>{p.team} · {p.hand==='L'?'LHB':p.hand==='R'?'RHB':'SHB'}</div>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28',minWidth:120}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{flex:1,height:5,background:'#222630'}}><div style={{height:'100%',width:`${p.score||0}%`,background:sc}}/></div>
                      <div style={{fontFamily:'Georgia,serif',fontSize:'1rem',color:sc,minWidth:28,textAlign:'right'}}>{p.score}</div>
                    </div>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28'}}>
                    <div style={{fontSize:'0.7rem',color:'#7a8090',fontStyle:'italic'}}>{p.game}</div>
                    <div style={{fontSize:'0.58rem',color:'#4a5060',marginTop:2}}>{p.park}</div>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28'}}>
                    <div style={{display:'flex',gap:5,alignItems:'center'}}>
                      {[{k:'batter_score',l:'Batter'},{k:'pitcher_score',l:'Pitcher'},{k:'park_score',l:'Park'},{k:'bullpen_score',l:'Bullpen'}].map(f=>(
                        <div key={f.k} title={`${f.l}: ${p[f.k]}`} style={{width:9,height:9,borderRadius:'50%',background:dotColor(p[f.k]||0),border:`1px solid ${(p[f.k]||0)>=45?'#f5a623':'#222630'}`,cursor:'help'}}/>
                      ))}
                    </div>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28'}}>
                    <span style={{...(CONF_STYLE[p.confidence]||CONF_STYLE.low),fontSize:'0.6rem',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',padding:'2px 7px',display:'inline-block'}}>
                      {p.confidence==='medium'?'MED':(p.confidence||'LOW').toUpperCase()}
                    </span>
                  </td>
                  <td style={{padding:'11px 14px',borderBottom:'1px solid #1a1e28',fontSize:'0.65rem',color:'#4a5060',fontStyle:'italic',maxWidth:160}}>{p.recent_form||'—'}</td>
                </tr>,
                isExp && <ExpandedRow key={`e${i}`} p={p}/>,
              ];
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}

function HistoryView() {
  const [log,setLog]=useState(null);
  useEffect(()=>{ fetch('hr_scout_results.json').then(r=>r.ok?r.json():null).then(d=>d&&setLog(d)).catch(()=>{}); },[]);
  if (!log||Object.keys(log).length===0) return (
    <div style={{padding:'40px 0',color:'#4a5060',fontSize:'0.72rem',textAlign:'center'}}>
      No calibration data yet.<br/>Log results via Cell 6 of the notebook and push <code>hr_scout_results.json</code>.
    </div>
  );
  const totals={'70+':{p:0,h:0},'60-69':{p:0,h:0},'50-59':{p:0,h:0},'<50':{p:0,h:0}};
  const sorted=Object.entries(log).sort(([a],[b])=>b.localeCompare(a)).slice(0,20);
  sorted.forEach(([,r])=>Object.entries(r.by_bucket||{}).forEach(([b,s])=>{ if(totals[b]){totals[b].p+=s.predicted;totals[b].h+=s.hr;} }));
  return (
    <div className="fade-in">
      <div style={{marginBottom:20}}>
        {sorted.map(([d,r])=>(
          <div key={d} style={{display:'flex',gap:12,padding:'8px 0',borderBottom:'1px solid #1a1e28',fontSize:'0.68rem',flexWrap:'wrap',alignItems:'center'}}>
            <span style={{color:'#f5a623',minWidth:90}}>{d}</span>
            <span style={{color:'#e8eaf0'}}>{r.hr_count}/{r.played} HR ({r.hit_rate_pct}%)</span>
            <span style={{color:'#4a5060',fontStyle:'italic',fontSize:'0.62rem'}}>{(r.hr_players||[]).join(', ')||'none'}</span>
          </div>
        ))}
      </div>
      <div style={{fontSize:'0.62rem',letterSpacing:'2px',textTransform:'uppercase',color:'#4a5060',marginBottom:10}}>Cumulative Hit Rate by Score Bucket</div>
      {Object.entries(totals).filter(([,t])=>t.p>0).map(([bucket,t])=>{
        const rate=Math.round(t.h/t.p*1000)/10;
        const color=bucket==='70+'?'#f5a623':bucket==='60-69'?'#e08020':'#555';
        return (
          <div key={bucket} style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,fontSize:'0.68rem'}}>
            <span style={{minWidth:52,color:'#7a8090'}}>{bucket}</span>
            <div style={{flex:1,height:6,background:'#1a1e28'}}><div style={{height:'100%',width:`${Math.min(rate,100)}%`,background:color,transition:'width 0.5s ease'}}/></div>
            <span style={{minWidth:80,color:'#e8eaf0',textAlign:'right'}}>{rate}% ({t.h}/{t.p})</span>
          </div>
        );
      })}
      <div style={{marginTop:10,fontSize:'0.6rem',color:'#2a2e3a'}}>MLB baseline HR rate ~3% per PA · Target: score 70+ ≥ 15%</div>
    </div>
  );
}

function HRScout() {
  const [predictions,setPredictions]=useState([]);
  const [generatedAt,setGeneratedAt]=useState('');
  const [gameDate,setGameDate]=useState('');
  const [gamesCount,setGamesCount]=useState(0);
  const [status,setStatus]=useState('loading');
  const [view,setView]=useState('rankings');

  useEffect(()=>{
    fetch('predictions.json?t='+Date.now())
      .then(r=>{ if(!r.ok)throw new Error(); return r.json(); })
      .then(data=>{ const p=data.predictions||[]; setPredictions(p); setGeneratedAt(data.generated_at||''); setGameDate(data.game_date||''); setGamesCount(data.games_count||0); setStatus(p.length>0?'ok':'empty'); })
      .catch(()=>setStatus('error'));
  },[]);

  return (
    <div style={{background:'#0a0c10',minHeight:'100vh',color:'#e8eaf0',fontFamily:"'Courier New',monospace",padding:'0 0 60px'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,backgroundImage:'linear-gradient(rgba(245,166,35,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,0.025) 1px,transparent 1px)',backgroundSize:'40px 40px'}}/>
      <div style={{position:'relative',zIndex:1,maxWidth:1060,margin:'0 auto',padding:'0 20px'}}>

        <div style={{padding:'32px 0 18px',borderBottom:'1px solid #222630',marginBottom:22,display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{fontFamily:'Georgia,serif',fontSize:'2.6rem',fontWeight:700,letterSpacing:3,lineHeight:1}}>
              HR <span style={{color:'#f5a623'}}>SCOUT</span> <span style={{fontSize:'1.2rem'}}>⚡</span>
            </div>
            <div style={{fontSize:'0.6rem',color:'#4a5060',letterSpacing:'3px',textTransform:'uppercase',marginTop:4,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <span>MLB Home Run Probability Engine</span>
              {gameDate && <span style={{color:'#f5a623'}}>· {fmt_date(gameDate)}</span>}
              {status==='ok' && <LiveBadge/>}
            </div>
          </div>
          <div style={{display:'flex',gap:0,border:'1px solid #222630'}}>
            {[['rankings','📊 Rankings'],['history','📈 History']].map(([id,label])=>(
              <button key={id} onClick={()=>setView(id)} style={{fontSize:'0.65rem',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',padding:'8px 16px',background:view===id?'#f5a623':'#111318',color:view===id?'#000':'#4a5060',border:'none',cursor:'pointer',borderRight:id==='rankings'?'1px solid #222630':'none'}}>{label}</button>
            ))}
          </div>
        </div>

        {view==='rankings' && (
          <>
            {status==='loading' && <div style={{textAlign:'center',padding:'80px 20px',color:'#4a5060'}}><div style={{fontSize:'2rem',animation:'pulse 1.5s ease infinite'}}>⚾</div><div style={{marginTop:16,fontSize:'0.72rem',letterSpacing:'2px'}}>LOADING PREDICTIONS…</div></div>}
            {status==='error' && <div style={{textAlign:'center',padding:'80px 20px',color:'#4a5060'}}><div style={{fontSize:'2.5rem',marginBottom:16,opacity:0.3}}>⚾</div><div style={{fontFamily:'Georgia,serif',fontSize:'1.3rem',letterSpacing:2,marginBottom:8,color:'#2a2e3a'}}>NO PREDICTIONS FOUND</div><div style={{fontSize:'0.72rem',lineHeight:1.8}}>Run the notebook (Cells 1–5) to generate and push predictions.json</div></div>}
            {status==='empty' && <div style={{textAlign:'center',padding:'80px 20px',color:'#4a5060'}}><div style={{fontSize:'2.5rem',marginBottom:16,opacity:0.3}}>⚾</div><div style={{fontFamily:'Georgia,serif',fontSize:'1.3rem',letterSpacing:2,marginBottom:8,color:'#2a2e3a'}}>NO GAMES TODAY</div><div style={{fontSize:'0.72rem'}}>Check back when games are scheduled.</div></div>}
            {status==='ok' && <div className="fade-in"><RankingsView predictions={predictions} generatedAt={generatedAt} gamesCount={gamesCount}/></div>}
          </>
        )}

        {view==='history' && <HistoryView/>}

        <div style={{marginTop:24,padding:'10px 14px',background:'#111318',border:'1px solid #222630',fontSize:'0.58rem',color:'#2a2e3a',lineHeight:1.7}}>
          ⚠️ FOR ENTERTAINMENT ONLY — Statistical predictions using live MLB Stats API, Statcast metrics, and weather. Do not use for wagering.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HRScout/>);
</script>
</body>
</html>
